services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexxaura_main
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 5s
      timeout: 2s
      retries: 5

  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    environment:
      REDIS_ADDR: redis:6379
    ports:
      - "9121:9121"
    depends_on:
      - redis

  # Replace with your real FastAPI; this stub exposes / and /metrics
  fastapi:
    build:
      context: ./observability/stub_fastapi
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 3s

  node-api:
    build: .
    command: ["node", "src/server.js"]
    environment:
      PORT: "4000"
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: nexxaura_main
      REDIS_URL: redis://redis:6379
      USE_SYNC_QUEUE: "1"
      NODE_ENV: production
      METRICS_ENABLED: "true"
      MEDICAL_BACKEND_BASE_URL: http://fastapi:8000
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:4000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      fastapi:
        condition: service_healthy

  node-worker:
    build: .
    command: ["node", "src/worker.js"]
    environment:
      WORKER_METRICS_PORT: "9109"
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: nexxaura_main
      REDIS_URL: redis://redis:6379
      USE_SYNC_QUEUE: "1"
      NODE_ENV: production
      METRICS_ENABLED: "true"
    ports:
      - "9109:9109"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.45.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - node-api
      - node-worker
      - fastapi
      - redis-exporter

  grafana:
    image: grafana/grafana:10.4.5
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
