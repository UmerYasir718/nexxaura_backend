services:
  postgres:
    image: ${POSTGRES_IMAGE}
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: ${POSTGRES_HEALTHCHECK_INTERVAL}
      timeout: ${POSTGRES_HEALTHCHECK_TIMEOUT}
      retries: ${POSTGRES_HEALTHCHECK_RETRIES}

  redis:
    image: ${REDIS_IMAGE}
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: ${REDIS_HEALTHCHECK_INTERVAL}
      timeout: ${REDIS_HEALTHCHECK_TIMEOUT}
      retries: ${REDIS_HEALTHCHECK_RETRIES}

  redis-exporter:
    image: ${REDIS_EXPORTER_IMAGE}
    environment:
      REDIS_ADDR: redis:${REDIS_PORT}
    ports:
      - "${REDIS_EXPORTER_PORT}:${REDIS_EXPORTER_PORT}"
    depends_on:
      - redis

  # Replace with your real FastAPI; this stub exposes / and /metrics
  fastapi:
    build:
      context: ${FASTAPI_STUB_CONTEXT}
    ports:
      - "${FASTAPI_PORT}:${FASTAPI_PORT}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:${FASTAPI_PORT}/')"]
      interval: ${FASTAPI_HEALTHCHECK_INTERVAL}
      timeout: ${FASTAPI_HEALTHCHECK_TIMEOUT}
      retries: ${FASTAPI_HEALTHCHECK_RETRIES}
      start_period: ${FASTAPI_HEALTHCHECK_START_PERIOD}

  node-api:
    build: .
    command: ["node", "src/server.js"]
    env_file:
      - .env
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      fastapi:
        condition: service_healthy

  node-worker:
    build: .
    command: ["node", "src/worker.js"]
    env_file:
      - .env
    ports:
      - "${WORKER_METRICS_PORT}:${WORKER_METRICS_PORT}"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  prometheus:
    image: ${PROMETHEUS_IMAGE}
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT}:${PROMETHEUS_PORT}"
    depends_on:
      - node-api
      - node-worker
      - fastapi
      - redis-exporter

  grafana:
    image: ${GRAFANA_IMAGE}
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: ${GF_USERS_ALLOW_SIGN_UP}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT}:${GRAFANA_PORT}"
    depends_on:
      - prometheus
